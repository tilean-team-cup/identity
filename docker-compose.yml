services:

  postgres:
    image: postgres:16-alpine
    container_name: keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - keycloak-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: keycloak
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      # Admin bootstrap
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      # Hostname — Cloudflare Tunnel termina TLS, KC gira in HTTP interno
      KC_HOSTNAME: https://id.tilea.net
      KC_HOSTNAME_STRICT: "true"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_LOG_LEVEL: INFO
    command: ["start", "--import-realm"]
    volumes:
      - ./keycloak/imports:/opt/keycloak/data/import:ro
      - ./keycloak/themes:/opt/keycloak/themes:ro
    networks:
      - keycloak-net
    ports:
      - "127.0.0.1:8080:8080"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - keycloak
    networks:
      - keycloak-net

  bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    container_name: naf-bridge
    restart: unless-stopped
    depends_on:
      - keycloak
    environment:
      PORT: 3000
      BRIDGE_URL: https://naf-bridge.tilea.net
      NAF_BASE_URL: https://member.thenaf.net
      NAF_CLIENT_ID: ${NAF_CLIENT_ID}
      NAF_CLIENT_SECRET: ${NAF_CLIENT_SECRET}
      NAF_REDIRECT_URI: ${NAF_REDIRECT_URI}
      KC_URL: http://keycloak:8080
      KC_PUBLIC_URL: https://id.tilea.net
      KC_REALM: tilea
      KC_ADMIN_CLIENT_ID: naf-bridge
      KC_ADMIN_CLIENT_SECRET: ${KC_BRIDGE_CLIENT_SECRET}
      BRIDGE_PRIVATE_KEY: ${BRIDGE_PRIVATE_KEY}
      BRIDGE_PUBLIC_KEY: ${BRIDGE_PUBLIC_KEY}
    networks:
      - keycloak-net
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres_data:

networks:
  keycloak-net:
    driver: bridge
